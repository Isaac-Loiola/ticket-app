<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl border-2 border-gray-200 w-full max-w-sm xl:max-w-md p-8 xl:p-10 flex flex-col gap-8">

        <div class="flex flex-col items-center gap-3">
            <div class="p-3 bg-blue-600 rounded-full">
                <img src="icons/ticket.svg" alt="" class="w-8 xl:w-10 brightness-0 invert">
            </div>
            <div class="flex flex-col items-center gap-1">
                <h1 class="font-bold text-xl xl:text-2xl text-gray-800">Bem-vindo</h1>
                <p class="text-sm text-gray-400">Faça login para continuar</p>
            </div>
        </div>

        <form [formGroup]="form" (ngSubmit)="login()" class="flex flex-col gap-4">

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-semibold text-gray-600">E-mail</label>
                <div class="flex items-center gap-3 border-2 border-gray-200 rounded-xl px-4 py-3 focus-within:border-blue-500 duration-150">
                    <img src="icons/user.svg" alt="" class="w-5 shrink-0">
                    <input
                        formControlName="email"
                        type="text"
                        placeholder="Digite seu e-mail"
                        class="flex-1 text-sm outline-none text-gray-700 placeholder-gray-300 bg-transparent"
                    >
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-semibold text-gray-600">Senha</label>
                <div class="flex items-center gap-3 border-2 border-gray-200 rounded-xl px-4 py-3 focus-within:border-blue-500 duration-150">
                    <img src="icons/password.svg" alt="" class="w-5 shrink-0">
                    <input
                        formControlName="password"
                        type="password"
                        placeholder="Digite sua senha"
                        class="flex-1 text-sm outline-none text-gray-700 placeholder-gray-300 bg-transparent"
                    >
                </div>
            </div>

            <button
                [disabled]="form.invalid"
                type="submit"
                class="mt-2 bg-blue-600 text-white font-semibold text-sm xl:text-base py-3.5 rounded-full active:scale-95 duration-100"
            >
                Entrar
            </button>

        </form>

    </div>

</div>
